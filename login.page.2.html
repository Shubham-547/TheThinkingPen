<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Login - Sahitya Hub</title>
    <link rel="stylesheet" href="login.page.1.css">
</head>
<body>
    <div class="login-container">
        <h2>Login</h2>
        
        <form action="#">
            <div class="input-group">  
                <input type="text" id="email" name="MyEmail" placeholder="ID (Email)" required>    
            </div>

            <div class="input-group">  
                <input type="password" id="password" name="MyPassword" placeholder="Password" required>
            </div>

            <div class="forgot-pass"> 
                <a href="https://myaccount.google.com/intro/signinoptions/password">Forgotten your Password?</a>
            </div>  
            <button type="submit" class="btn login-btn">Login</button>
        </form>

        <div class="divider">
            <span>OR</span>
        </div>

        <button class="btn google-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo" class="google-icon">
            Login with Google
        </button>
    </div>
</body>
</html>
